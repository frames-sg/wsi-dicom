name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

defaults:
  run:
    working-directory: wsi-dicom

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
        if: runner.os == 'Linux'
      - run: cargo clippy --workspace --no-default-features --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rust: stable }
          - { os: macos-latest, rust: stable }
          - { os: ubuntu-latest, rust: "1.96" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ matrix.rust }}
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
        if: runner.os == 'Linux'
      - run: cargo test --workspace --no-default-features --all-targets

  gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - run: cargo check -p wsi-dicom-gui

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo doc --no-default-features --no-deps

  docs-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo rustdoc --lib --no-default-features -- -D missing_docs

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo package

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: taiki-e/install-action@91534edaf9fd796a162759d80d49cdff574bff2c
      - run: cargo llvm-cov --package wsi-dicom --lib --bins --tests --no-default-features --summary-only --fail-under-lines 80

  fuzz-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - metadata_json
          - fhir_bundle
          - tile_preparation
          - dicom_validation_fragment
          - htj2k_decoder_template
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - run: cargo +nightly install cargo-fuzz --locked --version 0.13.1
      - run: cargo +nightly fuzz run ${{ matrix.target }} -- -runs=1000

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: taiki-e/install-action@b4a4706ba6e0f8a3cec3ed74eccce6e2d93436f7
      - run: cargo semver-checks check-release --default-features

  features:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, feature: cuda }
          - { os: macos-latest, feature: metal }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo check --features cuda --lib
        if: matrix.feature == 'cuda'
      - run: cargo check --features metal --lib
        if: matrix.feature == 'metal'

  metal-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo test --workspace --features metal --all-targets

  bench-internals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo check --features bench-internals --benches

  metal-feature:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo check --features metal --lib

  python-benchmark-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - run: python -m venv .venv-bench
      - run: .venv-bench/bin/python -m pip install --upgrade pip
      - run: .venv-bench/bin/python -m pip install -r bench/requirements.txt
      - run: .venv-bench/bin/python -m unittest discover -s tests -p 'test_gdc_benchmark.py'

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: crate-ci/typos@d80b8e26878e372a041833cd67163dbdb6a4336e
        with:
          files: wsi-dicom
          config: wsi-dicom/.github/typos.toml

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: wsi-dicom
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87
        with:
          command: check
          arguments: ""
          command-arguments: advisories bans licenses sources
          manifest-path: ./wsi-dicom/Cargo.toml
      - run: cargo install cargo-vet --locked --version 0.10.2
      - run: cargo vet --locked
