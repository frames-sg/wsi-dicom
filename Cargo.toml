[package]
name = "wsi-dicom"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "DICOM whole-slide export layer for statumen datasets"
rust-version = "1.94"
readme = "README.md"
repository = "https://github.com/jcwal1516/wsi-dicom"
keywords = ["dicom", "whole-slide", "microscopy", "pathology", "wsi"]
categories = ["multimedia::images", "science"]

[dependencies]
clap = { version = "4", features = ["derive"] }
dicom-core = "0.9"
dicom-dictionary-std = "0.9"
dicom-object = "0.9"
moxcms = "0.8.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
signinum-core = "=1.0.0"
signinum-j2k = "=1.1.0"
signinum-j2k-cuda = { version = "=0.3.0", optional = true, features = ["cuda-runtime"] }
signinum-j2k-metal = { version = "=0.3.0", optional = true }
signinum-jpeg = "=1.0.0"
signinum-jpeg-metal = { version = "=0.2.0", optional = true }
statumen = { git = "https://github.com/jcwal1516/statumen.git", rev = "eee07d136e42059252b950904840c1aef603d974", version = "=0.1.2" }
thiserror = "2"

[target.'cfg(target_os = "macos")'.dependencies]
metal = { version = "0.31", optional = true }
objc = { version = "0.2", optional = true }

[features]
default = []
gpu = ["cuda", "metal"]
cuda = ["dep:signinum-j2k-cuda"]
metal = [
    "dep:metal",
    "dep:objc",
    "dep:signinum-j2k-metal",
    "dep:signinum-jpeg-metal",
    "statumen/metal",
]
vendored-codecs = []

[dev-dependencies]
tempfile = "3"

[patch.crates-io]
signinum-core = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-cuda-runtime = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-j2k = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-j2k-cuda = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-j2k-metal = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-j2k-native = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-jpeg = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-jpeg-metal = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
signinum-tilecodec = { git = "https://github.com/jcwal1516/signinum.git", rev = "5be6a3caec2f6c9f653dbb0e0cc18deba1c9bc36" }
