[package]
name = "wsi-dicom"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"
description = "DICOM whole-slide export layer for statumen datasets"
rust-version = "1.94"
readme = "README.md"
repository = "https://github.com/frames-sg/wsi-dicom"
homepage = "https://github.com/frames-sg/wsi-dicom"
documentation = "https://docs.rs/wsi-dicom"
keywords = ["dicom", "whole-slide", "microscopy", "pathology", "wsi"]
categories = ["multimedia::images", "science"]
exclude = ["bench/**"]

[dependencies]
clap = { version = "4", features = ["derive"] }
dicom-core = "0.9"
dicom-dictionary-std = "0.9"
dicom-object = "0.9"
moxcms = "0.8.1"
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
signinum-core = { path = "../signinum/crates/signinum-core", version = "=0.4.2" }
signinum-j2k = { path = "../signinum/crates/signinum-j2k", version = "=0.4.2" }
signinum-j2k-cuda = { path = "../signinum/crates/signinum-j2k-cuda", version = "=0.4.2", optional = true, features = ["cuda-runtime"] }
signinum-j2k-metal = { path = "../signinum/crates/signinum-j2k-metal", version = "=0.4.2", optional = true }
signinum-jpeg = { path = "../signinum/crates/signinum-jpeg", version = "=0.4.2" }
signinum-jpeg-metal = { path = "../signinum/crates/signinum-jpeg-metal", version = "=0.4.2", optional = true }
statumen = "=0.3.0"
thiserror = "2"

[patch.crates-io]
signinum-core = { path = "../signinum/crates/signinum-core" }
signinum-cuda-runtime = { path = "../signinum/crates/signinum-cuda-runtime" }
signinum-j2k = { path = "../signinum/crates/signinum-j2k" }
signinum-j2k-cuda = { path = "../signinum/crates/signinum-j2k-cuda" }
signinum-j2k-metal = { path = "../signinum/crates/signinum-j2k-metal" }
signinum-j2k-native = { path = "../signinum/crates/signinum-j2k-native" }
signinum-jpeg = { path = "../signinum/crates/signinum-jpeg" }
signinum-jpeg-metal = { path = "../signinum/crates/signinum-jpeg-metal" }
signinum-profile = { path = "../signinum/crates/signinum-profile" }
signinum-tilecodec = { path = "../signinum/crates/signinum-tilecodec" }

[target.'cfg(target_os = "macos")'.dependencies]
metal = { version = "0.31", optional = true }
objc = { version = "0.2", optional = true }

[features]
default = []
bench-internals = []
gpu = ["cuda", "metal"]
cuda = ["dep:signinum-j2k-cuda"]
metal = [
    "dep:metal",
    "dep:objc",
    "dep:signinum-j2k-metal",
    "dep:signinum-jpeg-metal",
    "statumen/metal",
]
vendored-codecs = []

[dev-dependencies]
criterion = { version = "0.8.2", default-features = false, features = ["cargo_bench_support"] }
tempfile = "3"

[[bench]]
name = "internal_helpers"
harness = false
required-features = ["bench-internals"]
